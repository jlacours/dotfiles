general {
    inhibit_sleep = 0
    # LocalSend spams ScreenSaver inhibits and hypridle 0.1.7 leaks them on
    # disconnect; wayland-native inhibit (zwp_idle_inhibit) still works via labwc
    ignore_dbus_inhibit = true
}

listener {
    timeout = 900
    on-timeout = wlopm --off '*'
    on-resume = wlopm --on '*'
}
