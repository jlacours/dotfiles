source = ~/.config/hypr/themes/wallust.conf

################
### MONITORS ###
################

monitor = DP-2,3840x2160@60,0x0,1.6
monitor = DP-1,1920x1080@100,auto-up,1
monitor = HDMI-A-1,1920x1080@74.97300,2400x270,1

###################
### MY PROGRAMS ###
###################

# $terminal mirrors TERMINAL, $webbrowser mirrors BROWSER (environment.d).
# Compose every terminal-based launcher from $terminal so "foot" lives here once.
$terminal = foot
$fileManager = $terminal -e ranger
$altFileManager = pcmanfm
$menu = ~/.config/quickshell/scripts/qs-ipc.sh menu openApps "$(hyprctl activeworkspace -j | jq -r '.monitor')"
$webbrowser = zen-browser
$altwebbrowser = zen-browser --new-window
$dropdown_terminal = $terminal --app-id=scratchpad -o colors-dark.alpha=0.9 -e zsh
$newsboat = $terminal --app-id=newsboat -e newsboat
$powermenu = ~/.config/quickshell/scripts/qs-ipc.sh menu openPower "$(hyprctl activeworkspace -j | jq -r '.monitor')"
$windowmenu = ~/.config/quickshell/scripts/qs-ipc.sh menu openWindows "$(hyprctl activeworkspace -j | jq -r '.monitor')"
$musicplayer = $terminal -e rmpc
$restart_bar = ~/.config/quickshell/scripts/qs-switch.sh restart
$rofitools = ~/.config/quickshell/scripts/qs-ipc.sh menu openTools "$(hyprctl activeworkspace -j | jq -r '.monitor')"
$rofiapps = ~/.config/quickshell/scripts/qs-ipc.sh menu openFavorites "$(hyprctl activeworkspace -j | jq -r '.monitor')"
$screenmenu = ~/.config/quickshell/scripts/deactivate-screens.sh
$emacsclient = emacsclient -c
$nvim = $terminal --app-id=nvim -e nvim
$pulsemixer = $terminal --app-id=pulsemixer -e pulsemixer

#################
### AUTOSTART ###
#################

exec-once = hyprpaper
exec-once = ~/.config/quickshell/scripts/launch.sh
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --watch cliphist store
exec-once = $dropdown_terminal
exec-once = sleep 5 && paplay ~/.config/hypr/greeting.wav
exec-once = [workspace special:magic silent] $terminal --app-id=calcurse -e calcurse-sync

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

###################
### PERMISSIONS ###
###################

# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    resize_on_border = true
    allow_tearing = false
    layout = master
}

group {
    group_on_movetoworkspace = true
    groupbar {
        font_family = Comic Code
        font_size = 12
        font_weight_active = bold
        gradients = true
        gradient_rounding = 0
        gradient_round_only_edges = false
        render_titles = true
        indicator_height = 0
        indicator_gap = 0
        rounding = 0
        gaps_in = 0
        gaps_out = 0
        height = 20
    }
}

cursor {
  zoom_rigid = true
  zoom_detached_camera = false
}

decoration {
    rounding = 0
    rounding_power = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 3
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = false
        noise = 0.01
        contrast = 0.92
        brightness = 0.86
        vibrancy = 0.12
        vibrancy_darkness = 0.15
        popups = true
        popups_ignorealpha = 0.15
    }
}

animations {
    enabled = yes

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     5,     default
    animation = border,        1,     2.5,   easeOutQuint
    animation = windows,       1,     2.5,   easeOutQuint
    animation = windowsIn,     1,     2,     easeOutQuint, slide
    animation = windowsOut,    1,     1,     easeOutQuint, slide
    animation = fadeIn,        0
    animation = fadeOut,       1,     1,     easeOutQuint
    animation = fade,          0
    animation = layers,        1,     2,     easeOutQuint
    animation = layersIn,      1,     2,     easeOutQuint, slide
    animation = layersOut,     1,     2,     easeOutQuint, slide
    animation = fadeLayersIn,  0,     2,     easeOutQuint 
    animation = fadeLayersOut, 1,     2,     easeOutQuint 
    animation = workspaces,    1,     3,     easeOutQuint, slidevert
    animation = workspacesIn,  1,     2.5,   easeOutQuint, slidevert
    animation = workspacesOut, 1,     2.5,   easeOutQuint, slidevert
    animation = zoomFactor,    1,     3,     quick
}


dwindle {
    preserve_split = true
    force_split = 2
}

master {
    new_status = slave
    orientation = left
    mfact = 0.5
}

scrolling {
    column_width = 0.667
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0
    focus_fit_method = 1
    fullscreen_on_one_column = false
    direction = right
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}



#############
### INPUT ###
#############

input {
    kb_layout = us,ca
    kb_variant = ,multix
    kb_options = caps:escape,grp:win_space_toggle,fkeys:basic_13-24
    numlock_by_default = true
    follow_mouse = 1
    sensitivity = 0
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER
$keybinds = ~/.config/quickshell/scripts/qs-ipc.sh keybinds toggle "$(hyprctl activeworkspace -j | jq -r '.monitor')"
$clipboard = ~/.config/quickshell/scripts/qs-ipc.sh clipboard toggle "$(hyprctl activeworkspace -j | jq -r '.monitor')"
$wsflash = ~/.local/bin/wsflash

### Launchers ###
bindd = $mainMod, return, Open terminal, exec, $terminal
bindd = $mainMod SHIFT, return, Open dropdown terminal, exec, $dropdown_terminal
bindd = $mainMod, D, App launcher, exec, $menu
bindd = $mainMod, E, File manager, exec, $fileManager
bindd = $mainMod SHIFT, E, GUI file manager, exec, $altFileManager
bindd = $mainMod, A, Neovim, exec, $nvim
bindd = $mainMod SHIFT, A, Emacs, exec, $emacsclient
bindd = $mainMod, W, Web browser, exec, $webbrowser
bindd = $mainMod SHIFT, W, Alt. Web Browser, exec, $altwebbrowser
bindd = $mainMod, B, Favorite apps menu, exec, $rofiapps
bindd = $mainMod, tab, Window switcher, exec, $windowmenu
bindd = $mainMod, F1, Show keybindings, exec, $keybinds

### Window actions ###
bindd = $mainMod, Q, Kill active window, killactive
bindd = $mainMod SHIFT, F, Toggle floating, togglefloating
bindd = $mainMod, F, Toggle fullscreen, fullscreen
bindd = $mainMod, P, Pin window, pin
bindd = $mainMod SHIFT, C, Center floating window, centerwindow
bindd = $mainMod, G, Toggle tab group, togglegroup
bindd = $mainMod SHIFT, G, Move out of tab group, moveoutofgroup
bindd = $mainMod, bracketleft, Previous tab, changegroupactive, b
bindd = $mainMod, bracketright, Next tab, changegroupactive, f

### Bars and overlays ###
bindd = $mainMod, slash, Toggle popup, exec, ~/.config/quickshell/scripts/qs-ipc.sh bar togglePopup "$(hyprctl activeworkspace -j | jq -r '.monitor')"
bindd = $mainMod, N, Toggle notification center, exec, ~/.config/quickshell/scripts/qs-ipc.sh notifications toggle "$(hyprctl activeworkspace -j | jq -r '.monitor')"
bindd = $mainMod CTRL SHIFT, slash, Restart bar, exec, $restart_bar

### Theme ###
bindd = $mainMod SHIFT, slash, Restart bar, exec, $restart_bar
bindd = $mainMod SHIFT, semicolon, Random light theme, exec, ~/.local/bin/wallust-random-light

### Audio ###
bindd = $mainMod, M, Toggle mute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindd = $mainMod SHIFT, M, Pulsemixer, exec, $pulsemixer
bindd = $mainMod CONTROL, M, Cycle audio output, exec, ~/.local/bin/cycle-sink

### Hardware media keys (Razer Kraken dial, etc.) ###
binddel = , XF86AudioRaiseVolume, Volume up (media key), exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 1%+
binddel = , XF86AudioLowerVolume, Volume down (media key), exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
binddel = , XF86AudioMute, Toggle mute (media key), exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

### Layout ###
bindd = $mainMod, O, Cycle layout orientation, layoutmsg, orientationcycle left top right bottom center
bindd = $mainMod, BackSlash, Cycle layout, exec, ~/.local/bin/cycle-layout
bindd = $mainMod SHIFT, bracketright, Roll stack next, layoutmsg, rollnext
bindd = $mainMod SHIFT, bracketleft, Roll stack prev, layoutmsg, rollprev
bindd = $mainMod, comma, Shrink column (preset), layoutmsg, colresize -conf
bindd = $mainMod, period, Grow column (preset), layoutmsg, colresize +conf
bindd = $mainMod, T, Fit active column, layoutmsg, fit active
bindd = $mainMod SHIFT, T, Fit all columns, layoutmsg, fit all
bindd = $mainMod CONTROL, T, Fit visible columns, layoutmsg, fit visible
bindd = $mainMod ALT, LEFT, Scroll camera left, layoutmsg, move -col
bindd = $mainMod ALT, RIGHT, Scroll camera right, layoutmsg, move +col
bindd = $mainMod ALT, H, Scroll camera left (Vim), layoutmsg, move -col
bindd = $mainMod ALT, L, Scroll camera right (Vim), layoutmsg, move +col
bindd = $mainMod SHIFT, P, Promote to own column, layoutmsg, promote
bindd = $mainMod CONTROL SHIFT, LEFT, Swap column left, layoutmsg, swapcol l
bindd = $mainMod CONTROL SHIFT, RIGHT, Swap column right, layoutmsg, swapcol r
bindd = $mainMod CONTROL SHIFT, H, Swap column left (Vim), layoutmsg, swapcol l
bindd = $mainMod CONTROL SHIFT, L, Swap column right (Vim), layoutmsg, swapcol r

### Rofi tools and utilities ###
bindd = $mainMod SHIFT, Q, Power menu, exec, $powermenu
bindd = $mainMod, F12, Lock and turn off display, exec, loginctl lock-session && sleep 1 && hyprctl dispatch dpms off
bindd = $mainMod ALT, G, Toggle game mode, exec, ~/.config/hypr/scripts/game-mode.sh toggle
bindd = $mainMod SHIFT, F12, Deactivate screens, exec, $screenmenu
bindd = $mainMod, S, Tools menu, exec, $rofitools
bindd = $mainMod, V, Clipboard history, exec, $clipboard
bindd = $mainMod, I, Toggle idle inhibitor, exec, ~/.config/waybar/scripts/idle-inhibit.sh toggle

### Navigation ###
bindd = $mainMod, LEFT, Focus left, exec, $wsflash movefocus l
bindd = $mainMod, RIGHT, Focus right, exec, $wsflash movefocus r
bindd = $mainMod, UP, Focus up, exec, $wsflash movefocus u
bindd = $mainMod, DOWN, Focus down, exec, $wsflash movefocus d
bindd = $mainMod, H, Focus left (Vim), exec, $wsflash movefocus l
bindd = $mainMod, L, Focus right (Vim), exec, $wsflash movefocus r
bindd = $mainMod, K, Focus up (Vim), exec, $wsflash movefocus u
bindd = $mainMod, J, Focus down (Vim), exec, $wsflash movefocus d
bindd = $mainMod, U, Focus urgent or last window, focusurgentorlast

### Moving windows ###
bindd = $mainMod SHIFT, LEFT, Move window left, movewindow, l
bindd = $mainMod SHIFT, DOWN, Move window down, movewindow, d
bindd = $mainMod SHIFT, UP, Move window up, movewindow, u
bindd = $mainMod SHIFT, RIGHT, Move window right, movewindow, r
bindd = $mainMod SHIFT, H, Move window left (Vim), movewindow, l
bindd = $mainMod SHIFT, J, Move window down (Vim), movewindow, d
bindd = $mainMod SHIFT, K, Move window up (Vim), movewindow, u
bindd = $mainMod SHIFT, L, Move window right (Vim), movewindow, r
bindd = $mainMod CONTROL, LEFT, Move into group left, moveintogroup, l
bindd = $mainMod CONTROL, RIGHT, Move into group right, moveintogroup, r
bindd = $mainMod CONTROL, UP, Move into group up, moveintogroup, u
bindd = $mainMod CONTROL, DOWN, Move into group down, moveintogroup, d
bindd = $mainMod CONTROL, H, Move into group left (Vim), moveintogroup, l
bindd = $mainMod CONTROL, L, Move into group right (Vim), moveintogroup, r
bindd = $mainMod CONTROL, K, Move into group up (Vim), moveintogroup, u
bindd = $mainMod CONTROL, J, Move into group down (Vim), moveintogroup, d

### Workspaces ###
bindd = $mainMod, 1, Workspace 1, exec, $wsflash workspace 1
bindd = $mainMod, 2, Workspace 2, exec, $wsflash workspace 2
bindd = $mainMod, 3, Workspace 3, exec, $wsflash workspace 3
bindd = $mainMod, 4, Workspace 4, exec, $wsflash workspace 4
bindd = $mainMod, 5, Workspace 5, exec, $wsflash workspace 5
bindd = $mainMod, 6, Workspace 6, exec, $wsflash workspace 6
bindd = $mainMod, 7, Workspace 7, exec, $wsflash workspace 7
bindd = $mainMod, 8, Workspace 8, exec, $wsflash workspace 8
bindd = $mainMod, 9, Workspace 9, exec, $wsflash workspace 9
bindd = $mainMod, Z, Previous monitor workspace, exec, $wsflash workspace m-1
bindd = $mainMod, X, Next monitor workspace, exec, $wsflash workspace m+1
bindd = $mainMod SHIFT, Z, Previous relative workspace, exec, $wsflash workspace r-1
bindd = $mainMod SHIFT, X, Next relative workspace, exec, $wsflash workspace r+1
bindd = $mainMod SHIFT, 1, Move to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move to workspace 9, movetoworkspace, 9
bindd = $mainMod, minus, Toggle scratchpad, togglespecialworkspace, magic
bindd = $mainMod SHIFT, minus, Move to scratchpad, movetoworkspacesilent, special:magic
bindd = $mainMod, equal, Toggle dropdown terminal, togglespecialworkspace, dropdown
bindd = $mainMod SHIFT, equal, Move to dropdown workspace, movetoworkspacesilent, special:dropdown

### Zoom mode ###
bindd = $mainMod ALT, C, Enter zoom mode, exec, hyprctl keyword cursor:zoom_factor 2 && hyprctl dispatch submap zoom
submap = zoom
bindd = $mainMod ALT, C, Exit zoom mode, exec, hyprctl keyword cursor:zoom_factor 1 && hyprctl dispatch submap reset
bindd = , escape, Exit zoom mode, exec, hyprctl keyword cursor:zoom_factor 1 && hyprctl dispatch submap reset
bindd = , g, Exit zoom mode, exec, hyprctl keyword cursor:zoom_factor 1 && hyprctl dispatch submap reset
bindd = , catchall, Exit zoom mode, exec, hyprctl keyword cursor:zoom_factor 1 && hyprctl dispatch submap reset
submap = reset

### Resize mode ###
bindd = $mainMod, R, Enter resize mode, submap, resize
submap = resize
bindde = , LEFT, Shrink left, resizeactive, -20 0
bindde = , RIGHT, Grow right, resizeactive,  20 0
bindde = , UP, Shrink up, resizeactive,  0 -20
bindde = , DOWN, Grow down, resizeactive,  0  20
bindde = , H, Shrink left (Vim), resizeactive, -20 0
bindde = , L, Grow right (Vim), resizeactive,  20 0
bindde = , K, Shrink up (Vim), resizeactive,  0 -20
bindde = , J, Grow down (Vim), resizeactive,  0  20
bindde = SHIFT, LEFT, Move left, moveactive, -20 0
bindde = SHIFT, RIGHT, Move right, moveactive,  20 0
bindde = SHIFT, UP, Move up, moveactive,  0 -20
bindde = SHIFT, DOWN, Move down, moveactive,  0  20
bindde = SHIFT, H, Move left (Vim), moveactive, -20 0
bindde = SHIFT, L, Move right (Vim), moveactive,  20 0
bindde = SHIFT, K, Move up (Vim), moveactive,  0 -20
bindde = SHIFT, J, Move down (Vim), moveactive,  0  20
bindd = , c, Center window, centerwindow
bindd = , escape, Exit resize mode, submap, reset
bindd = , g, Exit resize mode, submap, reset
bindd = , return, Exit resize mode, submap, reset
bindd = , catchall, Exit resize mode, submap, reset
submap = reset

### Text and voice ###
bindd = $mainMod CONTROL, O, Read selected text aloud, exec, ~/.local/bin/tts-selection
bindd = $mainMod, semicolon, Correct focused field with local LLM, exec, ~/Projects/repos/llm-corrector-tui/bin/llm-corrector-field
bindd = $mainMod, C, Start voice input, exec, ~/.local/bin/voice-input start
binddr = $mainMod, C, Stop voice input, exec, ~/.local/bin/voice-input stop
bindd = , F21, Toggle Discord mute, sendshortcut, CTRL SHIFT, M, class:^([Vv]esktop|discord)$
bindd = , F20, Toggle Discord deafen, sendshortcut, CTRL SHIFT, D, class:^([Vv]esktop|discord)$
bindd = , F13, Toggle idle inhibitor, exec, ~/.config/waybar/scripts/idle-inhibit.sh toggle
bindd = , F14, Toggle suspend inhibitor, exec, ~/.local/bin/hypridle-suspend toggle

### Mouse ###
binddm = $mainMod, mouse:272, Drag to move window, movewindow
binddm = $mainMod, mouse:273, Drag to resize window, resizewindow


#####################
### LAYER RULES ###
#####################

layerrule {
    name = slurp-noanim
    match:namespace = selection
    animation = none
}

layerrule {
    name = quickshell-noanim
    match:namespace = ^quickshell.*
    animation = none
    blur = true
    ignore_alpha = 0.12
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Right monitor (27in)
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
# Left main monitor (31.5in 4K)
workspace = 4, monitor:DP-2, default:true
workspace = 5, monitor:DP-2
workspace = 6, monitor:DP-2
# Top monitor (24in)
workspace = 7, monitor:DP-1, default:true
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1

# Smart gaps and borders for single windows
workspace = r[1-9]w[tv1]s[false], gapsout:0, gapsin:0
workspace = r[1-9]f[1]s[false], gapsout:0, gapsin:0
windowrule {
    name = no-decorations-single-tiled
    match:float = false
    match:workspace = r[1-9]w[tv1]s[false]
    border_size = 0
    rounding = 0
    no_shadow = true
}

windowrule {
    name = no-decorations-single-fullscreen
    match:float = false
    match:workspace = r[1-9]f[1]s[false]
    border_size = 0
    rounding = 0
    no_shadow = true
}


windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# Dropdown terminal (scratchpad)
windowrule {
    name = dropdown-terminal
    match:class = scratchpad
    float = true
    workspace = special:dropdown silent
    size = 800 540
    center = true
    stay_focused = true
}

windowrule {
    name = zen-pip
    match:class = zen
    match:title = Picture-in-Picture
    float = true
    size = 480 270
    move = 1428 774
    pin = true
}

windowrule {
    name = journal-float
    match:class = journal
    float = true
    size = 1000 700
    center = true
}

windowrule {
    name = pulsemixer-float
    match:class = pulsemixer
    float = true
    size = 1000 400
    move = center
}

windowrule {
    name = llm-corrector-float
    match:title = ^llm-corrector$
    float = true
    size = 720 320
    center = true
    stay_focused = true
}

windowrule {
    name = zenity-color-float
    match:class = zenity
    match:title = Copy color to Clipboard
    float = true
}

# Force DayZ to keep rendering when unfocused (e.g. when focusing second monitor)
windowrule {
    name = dayz-render-unfocused
    match:class = steam_app_221100
    render_unfocused = on
}

# Keep the DayZ launcher floating and centered without affecting the game window
windowrule {
    name = dayz-launcher-float
    match:class = steam_app_221100
    match:title = ^DayZ Launcher$
    float = true
    center = true
}

# Hide DayZ launcher shadow windows (separate XWayland windows that don't follow the main window)
windowrule {
    name = dayz-drop-shadow
    match:title = DropShadowWindow
    opacity = 0
    no_focus = true
    size = 0 0
}

# Force RDR2 to stay fullscreen
windowrule {
  name = rdr2-fullscreen
  match:class = rdr2.exe
  fullscreen = true
}

windowrule {
  name = float-portal-file-dialog
  match:class = xdg-desktop-portal-gtk
  float = yes
  size = 800 500
}

windowrule {
    name = calcurse-float
    match:class = calcurse
    float = true
    size = 1000 700
    center = true
}
