# -- General --
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 100000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on

# -- Prefix --
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- Splits --
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# -- Prompts (popup) --
# Built-in command-prompt draws over the status line and tmux only clears the
# prompt's own width, so the busy bar bleeds through underneath. Run renames in
# a popup instead, off the status line.
bind , display-popup -b rounded -S fg=color10 -w 56 -h 5 -T ' rename window ' -E "bash ~/.config/tmux/rename.sh window '#{window_name}'"
bind '$' display-popup -b rounded -S fg=color10 -w 56 -h 5 -T ' rename session ' -E "bash ~/.config/tmux/rename.sh session '#{session_name}'"

# -- Pane navigation (arrow keys) --
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# -- Pane resizing --
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- Window movement --
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# -- Copy mode (vi) --
setw -g mode-keys vi
bind v copy-mode
bind PageUp copy-mode -u
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi PageUp send -X page-up
bind -T copy-mode-vi PageDown send -X page-down

# -- Status bar --
set -g status-position top
set -g status-interval 5
set -g @status-sep-left ''
set -g @status-sep-right ''
# Keep the bar style constant; the prefix state is shown as a chip on the right,
# not by recolouring the whole bar.
set -g status-style 'bg=default fg=color7'
set -g status-left '#[fg=color10]#[bg=default]#{@status-sep-left}#[fg=color0]#[bg=color10]#[bold] #S #[fg=color10]#[bg=default]#{@status-sep-right}'
set -g status-left-length 40
# Right side: tip / prefix indicator on a light chip, then the host chip.
set -g status-right '#{?client_prefix,#[fg=color0]#[bg=color10]#[bold] PREFIX ACTIVE #[default],#[fg=color0]#[bg=color7] #(bash ~/.config/tmux/tips.sh) #[default]} #[fg=color10]#[bg=default]#{@status-sep-left}#[fg=color0]#[bg=color10]#[bold] #H #[fg=color10]#[bg=default]#{@status-sep-right}'
set -g status-right-length 100

# Single-line bar: session + windows on left; tip / prefix indicator + host on right
set -g status-format[0] "#[align=left]#[push-default]#{T:status-left}#[pop-default]#[default] #{W:#[fg=color0]#[bg=color7] #I #[fg=color15]#[bg=color8] #W #[default] ,#[fg=color0]#[bg=color10] #I #[fg=color10]#[bg=color8]#[bold] #W #[default] }#[align=right]#[push-default]#{T:status-right}#[pop-default]"

# Window status
setw -g window-status-format '#[fg=color0]#[bg=color7] #I #[fg=color15]#[bg=color8] #W #[default] '
setw -g window-status-current-format '#[fg=color0]#[bg=color10] #I #[fg=color10]#[bg=color8]#[bold] #W #[default] '
setw -g window-status-separator ''

# -- Pane borders --
set -g pane-border-style 'fg=color8'
set -g pane-active-border-style 'fg=color10'

# -- Messages --
set -g message-style 'fg=color0,bg=color3,bold'

# -- Reload config --
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# -- Plugins --
set -g @plugin 'tmux-plugins/tpm'

# Initialize TPM (keep at the very bottom)
if-shell '[ -x ~/.config/tmux/plugins/tpm/tpm ]' 'run ~/.config/tmux/plugins/tpm/tpm'
